<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>AR Bubble Pop</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { background:#0a0a12; color:#fff; font-family:'Inter',Arial,sans-serif; overflow:hidden; touch-action:none; }

    /* ── Name screen ──────────────────────────────── */
    #name-screen {
      position:fixed; inset:0; z-index:600; background:#0a0a12;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      padding:32px 24px; gap:28px;
    }
    #name-screen.hidden { display:none; }
    .ns-logo { text-align:center; }
    .ns-logo h1 {
      font-size:32px; font-weight:900; letter-spacing:-1px;
      background:linear-gradient(135deg,#6bcb77,#4d96ff);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    .ns-logo p { font-size:14px; opacity:.4; margin-top:6px; }
    .ns-card { width:100%; max-width:320px; display:flex; flex-direction:column; gap:16px; }
    .ns-label { font-size:13px; font-weight:600; opacity:.5; text-transform:uppercase; letter-spacing:.8px; }
    #player-name-input {
      width:100%; padding:16px 20px; border-radius:14px;
      background:rgba(255,255,255,.08); border:2px solid rgba(255,255,255,.12);
      color:#fff; font-family:inherit; font-size:22px; font-weight:700;
      outline:none; text-align:center; transition:border-color .2s;
    }
    #player-name-input:focus { border-color:rgba(109,203,119,.6); }
    #player-name-input::placeholder { color:rgba(255,255,255,.2); font-weight:400; font-size:18px; }
    #play-btn {
      padding:18px; border:none; border-radius:14px; font-family:inherit;
      font-size:20px; font-weight:800; cursor:pointer; letter-spacing:.3px;
      background:linear-gradient(135deg,#6bcb77,#4d96ff); color:#fff;
      transition:transform .15s, opacity .15s;
    }
    #play-btn:active { transform:scale(.97); opacity:.9; }
    #ns-error { font-size:13px; color:#ff6b6b; text-align:center; display:none; }
    #ns-error.show { display:block; }

    /* ── Status overlay ───────────────────────────── */
    #status-overlay {
      position:fixed; inset:0; background:#0a0a12; z-index:500;
      display:none; flex-direction:column; align-items:center; justify-content:center;
      gap:16px; padding:32px; text-align:center;
    }
    #status-overlay.show { display:flex; }
    #status-overlay.error .spinner { border-top-color:#ff6b6b; animation:none; opacity:.4; }
    #status-overlay.error #s-title { color:#ff6b6b; }
    .spinner { width:48px; height:48px; border:3px solid rgba(255,255,255,.12); border-top-color:#6bcb77; border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    #s-title { font-size:20px; font-weight:700; }
    #s-msg   { font-size:14px; opacity:.5; max-width:260px; line-height:1.5; }

    /* ── AR scene ─────────────────────────────────── */
    #container { width:100vw; height:100vh; }

    /* ── HUD ──────────────────────────────────────── */
    #hud { position:fixed; top:0; left:0; right:0; padding:14px 16px; display:flex; justify-content:space-between; pointer-events:none; z-index:100; }
    .hud-box { background:rgba(0,0,0,.65); backdrop-filter:blur(6px); color:#fff; padding:10px 18px; border-radius:14px; text-align:center; min-width:90px; }
    .hud-label { font-size:11px; opacity:.6; text-transform:uppercase; letter-spacing:1px; }
    .hud-value { font-size:38px; font-weight:900; line-height:1.1; }
    #timer-bar { position:fixed; bottom:0; left:0; height:5px; background:#6bcb77; width:100%; transition:width 1s linear, background-color .5s; z-index:100; }

    /* ── Scan prompt ──────────────────────────────── */
    #scan-prompt {
      position:fixed; bottom:36px; left:50%; transform:translateX(-50%);
      background:rgba(0,0,0,.75); backdrop-filter:blur(8px);
      color:#fff; padding:14px 24px; border-radius:28px; font-size:15px;
      white-space:nowrap; z-index:100; display:none; align-items:center; gap:10px;
    }
    #target-peek { width:38px; height:38px; border-radius:8px; object-fit:contain; background:#fff; padding:2px; cursor:pointer; pointer-events:all; }
    #target-hint {
      position:fixed; bottom:0; left:0; right:0; background:rgba(0,0,0,.9); backdrop-filter:blur(10px);
      padding:18px 24px 38px; display:flex; align-items:center; gap:16px; z-index:400;
      transform:translateY(100%); transition:transform .35s cubic-bezier(.34,1.2,.64,1);
    }
    #target-hint.show { transform:translateY(0); }
    #hint-img { width:80px; height:80px; object-fit:contain; border-radius:10px; background:#fff; padding:4px; flex-shrink:0; }
    .ht { }
    .ht h3 { font-size:15px; font-weight:700; margin-bottom:4px; }
    .ht p  { font-size:13px; opacity:.5; line-height:1.4; }
    #hint-close { margin-left:auto; background:none; border:none; color:rgba(255,255,255,.4); font-size:22px; cursor:pointer; flex-shrink:0; padding:0 0 0 12px; }

    /* ── Countdown ────────────────────────────────── */
    #countdown-overlay { position:fixed; inset:0; display:none; align-items:center; justify-content:center; background:rgba(0,0,0,.45); color:#fff; font-size:130px; font-weight:900; z-index:200; }

    /* ── Game over ────────────────────────────────── */
    #gameover { position:fixed; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center; background:rgba(0,0,0,.85); backdrop-filter:blur(8px); color:#fff; gap:18px; z-index:300; padding:24px; }
    #gameover h2 { font-size:36px; font-weight:900; }
    #go-score { font-size:90px; font-weight:900; color:#ffd93d; line-height:1; }
    #go-rank  { font-size:18px; opacity:.6; min-height:26px; }
    .go-btn { font-size:17px; font-weight:700; padding:14px 40px; border:none; border-radius:12px; cursor:pointer; pointer-events:all; }
    #again-btn { background:#4d96ff; color:#fff; }

    /* ── Float label ──────────────────────────────── */
    .float-label { position:fixed; font-size:32px; font-weight:900; pointer-events:none; z-index:150; transform:translateX(-50%); animation:float-up .9s ease-out forwards; }
    @keyframes float-up { from{opacity:1;transform:translateX(-50%) translateY(0)} to{opacity:0;transform:translateX(-50%) translateY(-80px)} }

    /* ── WS dot ───────────────────────────────────── */
    #ws-dot { position:fixed; bottom:12px; right:12px; width:10px; height:10px; border-radius:50%; background:#888; z-index:100; transition:background .4s; }
    #ws-dot.ok  { background:#6bcb77; }
    #ws-dot.err { background:#ff6b6b; }
  </style>
</head>
<body>

<!-- Name input -->
<div id="name-screen">
  <div class="ns-logo">
    <h1>AR Bubble Pop</h1>
    <p>Quick-push bear edition · 30 seconds</p>
  </div>
  <div class="ns-card">
    <div class="ns-label">What's your name?</div>
    <input id="player-name-input" type="text" placeholder="Enter your name" maxlength="20" autocorrect="off" autocapitalize="words">
    <div id="ns-error"></div>
    <button id="play-btn">Let's Play →</button>
  </div>
</div>

<!-- Status -->
<div id="status-overlay">
  <div class="spinner"></div>
  <div id="s-title">Starting up…</div>
  <div id="s-msg">Loading AR engine</div>
</div>

<!-- AR -->
<div id="container"></div>
<div id="hud">
  <div class="hud-box"><div class="hud-label">Score</div><div class="hud-value" id="score-val">0</div></div>
  <div class="hud-box"><div class="hud-label">Time</div><div class="hud-value"  id="timer-val">30</div></div>
</div>
<div id="timer-bar"></div>
<div id="scan-prompt">📷 Point at this image <img id="target-peek" src="" alt="target"></div>
<div id="target-hint">
  <img id="hint-img" src="" alt="target">
  <div class="ht"><h3>Point your camera at this image</h3><p>Hold steady — the bear toy will appear!</p></div>
  <button id="hint-close">✕</button>
</div>
<div id="countdown-overlay"></div>
<div id="gameover">
  <h2>Time's Up!</h2>
  <div id="go-score">0</div>
  <div id="go-rank"></div>
  <button class="go-btn" id="again-btn">Play Again</button>
</div>
<div id="ws-dot"></div>

<script type="importmap">
{
  "imports": {
    "three": "/node_modules/three/build/three.module.js",
    "three/addons/": "/node_modules/three/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three'
import { MindARThree } from '/node_modules/mind-ar/dist/mindar-image-three.prod.js'

// ── IDs ───────────────────────────────────────────────────────────────────────
const desktopId = new URLSearchParams(location.search).get('desk') || ''
let playerId = sessionStorage.getItem('playerId')
if (!playerId) { playerId = crypto.randomUUID(); sessionStorage.setItem('playerId', playerId) }

// ── HTTPS guard ───────────────────────────────────────────────────────────────
if (location.protocol !== 'https:' && !['localhost','127.0.0.1'].includes(location.hostname)) {
  document.getElementById('name-screen').innerHTML = `<div style="text-align:center;padding:32px;max-width:300px"><div style="font-size:48px;margin-bottom:16px">🔒</div><h2 style="font-size:20px;margin-bottom:10px">HTTPS Required</h2><p style="opacity:.5;font-size:14px;line-height:1.6">Open via the ngrok HTTPS URL, not the local IP.</p></div>`
  throw new Error('Not HTTPS')
}

// ── DOM ───────────────────────────────────────────────────────────────────────
const nameScreen   = document.getElementById('name-screen')
const statusOl     = document.getElementById('status-overlay')
const sTitle       = document.getElementById('s-title')
const sMsg         = document.getElementById('s-msg')
const scoreVal     = document.getElementById('score-val')
const timerVal     = document.getElementById('timer-val')
const timerBar     = document.getElementById('timer-bar')
const scanPrompt   = document.getElementById('scan-prompt')
const targetPeek   = document.getElementById('target-peek')
const targetHint   = document.getElementById('target-hint')
const hintImg      = document.getElementById('hint-img')
const countdownEl  = document.getElementById('countdown-overlay')
const gameoverEl   = document.getElementById('gameover')
const goScore      = document.getElementById('go-score')
const goRank       = document.getElementById('go-rank')
const container    = document.getElementById('container')
const wsDot        = document.getElementById('ws-dot')

// ── WebSocket ─────────────────────────────────────────────────────────────────
let ws = null, playerName = ''
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:'
  ws = new WebSocket(`${proto}//${location.host}`)
  ws.onopen  = () => { wsDot.className = 'ok'; ws.send(JSON.stringify({ type: 'player_connect', playerId, desktopId })) }
  ws.onclose = () => { wsDot.className = 'err'; setTimeout(connectWS, 2500) }
  ws.onmessage = (e) => {
    let msg; try { msg = JSON.parse(e.data) } catch { return }
    if (msg.type === 'score_saved') goRank.textContent = msg.rank === 1 ? '🥇 New high score!' : `Rank #${msg.rank}`
  }
}
connectWS()
function wsSend(obj) { if (ws?.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj)) }

// ── Name screen ───────────────────────────────────────────────────────────────
const nameInput = document.getElementById('player-name-input')
const nsError   = document.getElementById('ns-error')

document.getElementById('play-btn').addEventListener('click', submitName)
nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') submitName() })

function submitName() {
  const name = nameInput.value.trim()
  if (!name) { nsError.textContent = 'Please enter your name'; nsError.classList.add('show'); return }
  nsError.classList.remove('show')
  playerName = name
  wsSend({ type: 'set_name', name })
  nameScreen.classList.add('hidden')
  startAR()
}

// ── AR init (runs after name entered) ─────────────────────────────────────────
async function startAR() {
  statusOl.classList.add('show')
  sMsg.textContent = 'Loading config…'

  const cfg = await fetch('/config.json').then(r => r.json()).catch(() => ({}))
  const targetMindUrl  = cfg.targetMindUrl  || './targets.mind'
  const targetImageUrl = cfg.targetImageUrl || ''

  if (targetImageUrl) { targetPeek.src = targetImageUrl; hintImg.src = targetImageUrl }
  else targetPeek.style.display = 'none'

  targetPeek.addEventListener('click', () => targetHint.classList.add('show'))
  document.getElementById('hint-close').addEventListener('click', () => targetHint.classList.remove('show'))

  sMsg.textContent = 'Requesting camera…'
  let mindar
  try {
    mindar = new MindARThree({ container, imageTargetSrc: targetMindUrl, uiLoading:'no', uiError:'no', uiScanning:'no' })
  } catch (e) { showError(`AR init failed: ${e.message}`); return }

  const { renderer, scene, camera } = mindar

  // ── Lighting ──────────────────────────────────────────────────────────────
  scene.add(new THREE.AmbientLight(0xffffff, 0.55))
  const sun = new THREE.DirectionalLight(0xfff4e0, 1.1)
  sun.position.set(0.5, 1.5, 2)
  scene.add(sun)
  const fill = new THREE.DirectionalLight(0xd0e8ff, 0.4)
  fill.position.set(-1, 0, 1)
  scene.add(fill)

  const anchor = mindar.addAnchor(0)

  // ── Build the bear toy ────────────────────────────────────────────────────
  const { toyGroup, btnDomes } = buildBearToy()
  anchor.group.add(toyGroup)

  // ── Raycaster ─────────────────────────────────────────────────────────────
  const ray = new THREE.Raycaster()
  const ndc = new THREE.Vector2()
  function castRay(cx, cy) {
    if (gameState !== 'PLAYING') return
    const r = renderer.domElement.getBoundingClientRect()
    ndc.x =  ((cx - r.left) / r.width)  * 2 - 1
    ndc.y = -((cy - r.top)  / r.height) * 2 + 1
    ray.setFromCamera(ndc, camera)
    const hits = ray.intersectObjects(btnDomes)
    if (hits.length) pressBtn(hits[0].object)
  }
  container.addEventListener('touchstart', e => { e.preventDefault(); castRay(e.touches[0].clientX, e.touches[0].clientY) }, { passive:false })
  container.addEventListener('click', e => castRay(e.clientX, e.clientY))

  // ── Game state ────────────────────────────────────────────────────────────
  const GAME_DURATION = 30
  let gameState = 'WAITING'
  let score = 0, timeLeft = GAME_DURATION, timerInterval = null, spawnTimeout = null

  // Button states: 'off' | 'green' | 'purple'
  const btnStates  = new Array(btnDomes.length).fill('off')
  const btnTimers  = new Array(btnStates.length).fill(null)
  const pressAnims = new Map() // dome → { t0, duration }

  // Colors
  const COL_OFF    = 0x9E8478
  const COL_GREEN  = 0x44FF72
  const COL_PURPLE = 0xDD33FF
  const COL_FLASH  = 0xFF3344

  function setBtn(i, state) {
    clearTimeout(btnTimers[i])
    btnStates[i] = state
    const mat = btnDomes[i].material
    if (state === 'off')    { mat.color.setHex(COL_OFF);    mat.emissive?.setHex(0x000000) }
    if (state === 'green')  { mat.color.setHex(COL_GREEN);  mat.emissive?.setHex(0x226622) }
    if (state === 'purple') { mat.color.setHex(COL_PURPLE); mat.emissive?.setHex(0x441166) }
    // Auto-turn-off after window
    if (state !== 'off') {
      const ttl = state === 'green' ? 2800 : 2200
      btnTimers[i] = setTimeout(() => setBtn(i, 'off'), ttl)
    }
  }

  function pressBtn(dome) {
    const i = btnDomes.indexOf(dome)
    if (i === -1 || btnStates[i] === 'off') return
    clearTimeout(btnTimers[i])

    const state = btnStates[i]
    if (state === 'green') {
      score += 10; floatLabel('+10', '#44FF72', dome)
    } else if (state === 'purple') {
      score = Math.max(0, score - 20); floatLabel('-20', '#DD33FF', dome)
      dome.material.color.setHex(COL_FLASH) // brief red flash
    }
    updateHUD()
    wsSend({ type: 'live_score', score })

    // Press animation
    pressAnims.set(dome, { t0: performance.now(), duration: 180 })
    setTimeout(() => setBtn(i, 'off'), state === 'purple' ? 120 : 0)
  }

  function spawnLoop() {
    if (gameState !== 'PLAYING') return
    const progress = 1 - timeLeft / GAME_DURATION   // 0→1
    const interval = 850 - progress * 430            // 850ms → 420ms (speeds up)

    // Pick 1–2 random OFF buttons to light up
    const offIdxs = btnStates.map((s, i) => s === 'off' ? i : -1).filter(i => i !== -1)
    const count = offIdxs.length >= 2 && Math.random() < 0.35 ? 2 : 1
    for (let k = 0; k < count && offIdxs.length; k++) {
      const pick = offIdxs.splice(Math.floor(Math.random() * offIdxs.length), 1)[0]
      setBtn(pick, Math.random() < 0.22 ? 'purple' : 'green')
    }

    spawnTimeout = setTimeout(spawnLoop, interval)
  }

  function updateHUD() {
    scoreVal.textContent = score
    timerVal.textContent = timeLeft
    timerVal.style.color = timeLeft <= 5 ? '#ff6b6b' : '#fff'
    const pct = timeLeft / GAME_DURATION * 100
    timerBar.style.width = pct + '%'
    timerBar.style.backgroundColor = pct < 20 ? '#ff6b6b' : pct < 50 ? '#ffd93d' : '#6bcb77'
  }

  anchor.onTargetFound = () => { if (gameState === 'WAITING') startCountdown() }

  function startCountdown() {
    gameState = 'COUNTDOWN'
    scanPrompt.style.display = 'none'
    targetHint.classList.remove('show')
    countdownEl.style.display = 'flex'
    let n = 3; countdownEl.textContent = n
    const iv = setInterval(() => {
      n--
      if (n > 0) { countdownEl.textContent = n }
      else { clearInterval(iv); countdownEl.textContent = 'GO!'; setTimeout(startGame, 700) }
    }, 1000)
  }

  function startGame() {
    gameState = 'PLAYING'; score = 0; timeLeft = GAME_DURATION
    countdownEl.style.display = 'none'
    updateHUD()
    spawnLoop()
    timerInterval = setInterval(() => {
      timeLeft--; updateHUD()
      wsSend({ type: 'live_score', score })
      if (timeLeft <= 0) { clearInterval(timerInterval); endGame() }
    }, 1000)
  }

  function endGame() {
    gameState = 'GAMEOVER'
    clearTimeout(spawnTimeout)
    btnStates.fill(null); btnDomes.forEach((d, i) => { clearTimeout(btnTimers[i]); setBtn(i, 'off') })
    goScore.textContent = score
    goRank.textContent  = '…'
    gameoverEl.style.display = 'flex'
    wsSend({ type: 'submit_score', score })
  }

  document.getElementById('again-btn').addEventListener('click', () => {
    gameoverEl.style.display = 'none'
    btnStates.fill('off')
    gameState = 'WAITING'; score = 0; timeLeft = GAME_DURATION
    updateHUD()
    scanPrompt.style.display = 'flex'
    targetHint.classList.add('show')
    setTimeout(() => targetHint.classList.remove('show'), 3000)
  })

  // ── Floating label ─────────────────────────────────────────────────────────
  function floatLabel(text, color, dome) {
    const pos = new THREE.Vector3(); dome.getWorldPosition(pos); pos.project(camera)
    const el = document.createElement('div')
    el.className = 'float-label'
    el.textContent = text
    el.style.left  = `${(pos.x*.5+.5)*window.innerWidth}px`
    el.style.top   = `${(pos.y*-.5+.5)*window.innerHeight}px`
    el.style.color = color
    document.body.appendChild(el)
    setTimeout(() => el.remove(), 920)
  }

  // ── Start MindAR ──────────────────────────────────────────────────────────
  sMsg.textContent = 'Starting camera…'
  try { await mindar.start() }
  catch (e) { showError(e?.name === 'NotAllowedError' ? 'Camera permission denied — allow and refresh.' : `AR failed: ${e?.message}`); return }

  statusOl.classList.remove('show')
  scanPrompt.style.display = 'flex'
  targetHint.classList.add('show')
  setTimeout(() => targetHint.classList.remove('show'), 4000)

  // ── Render loop ────────────────────────────────────────────────────────────
  renderer.setAnimationLoop(() => {
    const now = performance.now()

    // Button pulse for lit buttons
    btnDomes.forEach((dome, i) => {
      const s = btnStates[i]
      if (s === 'green' || s === 'purple') {
        const pulse = 1 + Math.sin(now / 140) * 0.05
        dome.scale.setScalar(pulse)
      }
    })

    // Press animations
    pressAnims.forEach((anim, dome) => {
      const t = Math.min((now - anim.t0) / anim.duration, 1)
      dome.scale.setScalar(1 - Math.sin(t * Math.PI) * 0.28)
      if (t >= 1) { dome.scale.setScalar(1); pressAnims.delete(dome) }
    })

    renderer.render(scene, camera)
  })
}

function showError(msg) {
  statusOl.className = 'show error'
  sTitle.textContent = 'Error'
  sMsg.textContent = msg
}

// ── Bear toy builder ──────────────────────────────────────────────────────────
function buildBearToy() {
  const g = new THREE.Group()

  // Materials
  const mBody     = new THREE.MeshLambertMaterial({ color: 0xF0EBE0 })
  const mRecess   = new THREE.MeshLambertMaterial({ color: 0xBFA49E })
  const mBtnRim   = new THREE.MeshLambertMaterial({ color: 0xB8978F })
  const mBear     = new THREE.MeshLambertMaterial({ color: 0x8B5E3C })
  const mInnerEar = new THREE.MeshLambertMaterial({ color: 0xC4846A })
  const mDark     = new THREE.MeshBasicMaterial({ color: 0x1A0E08 })
  const mCtrl     = new THREE.MeshLambertMaterial({ color: 0xC8B0A8 })

  // ── Body ──────────────────────────────────────────────────────────────────
  const bodyShape = roundedRect(0.70, 0.88, 0.10)
  const bodyGeo = new THREE.ExtrudeGeometry(bodyShape, { depth:0.13, bevelEnabled:true, bevelThickness:0.022, bevelSize:0.022, bevelSegments:3 })
  const body = new THREE.Mesh(bodyGeo, mBody)
  // roundedRect already centers at origin — no offset needed
  g.add(body)

  // ── Display recess ────────────────────────────────────────────────────────
  const recShape = roundedRect(0.50, 0.44, 0.06)
  const recGeo = new THREE.ExtrudeGeometry(recShape, { depth:0.008, bevelEnabled:false })
  const rec = new THREE.Mesh(recGeo, mRecess)
  rec.position.set(0, -0.06, 0.13)
  g.add(rec)

  // ── Control buttons (top strip, above recess) ────────────────────────────
  const ctrlGeo = new THREE.BoxGeometry(0.044, 0.025, 0.012)
  ;[-0.09, 0, 0.09].forEach(x => {
    const c = new THREE.Mesh(ctrlGeo, mCtrl)
    c.position.set(x, 0.20, 0.145)
    g.add(c)
  })

  // ── Pop buttons (4 × 3 grid inside recess) ───────────────────────────────
  const COLS = 4, ROWS = 3
  const SX = 0.108, SY = 0.100
  const rimGeo  = new THREE.CylinderGeometry(0.042, 0.042, 0.018, 16)
  const domeGeo = new THREE.SphereGeometry(0.036, 14, 10, 0, Math.PI*2, 0, Math.PI/2)
  const btnDomes = []

  for (let row = 0; row < ROWS; row++) {
    for (let col = 0; col < COLS; col++) {
      const x = (col - (COLS-1)/2) * SX
      const y = (row - (ROWS-1)/2) * SY * -1 - 0.06  // centered on recess (y≈-0.06)

      const rim = new THREE.Mesh(rimGeo, mBtnRim)
      rim.rotation.x = Math.PI / 2
      rim.position.set(x, y, 0.142)
      g.add(rim)

      const mat  = new THREE.MeshLambertMaterial({ color: 0x9E8478, emissive: 0x000000 })
      const dome = new THREE.Mesh(domeGeo, mat)
      dome.rotation.x = Math.PI / 2
      dome.position.set(x, y, 0.148)
      g.add(dome)
      btnDomes.push(dome)
    }
  }

  // ── Bear head (sits above body top at y=0.44) ─────────────────────────────
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.115, 18, 14), mBear)
  head.position.set(0, 0.50, 0.085)
  g.add(head)

  // Bear body shoulder bumps (near top-corners of body)
  ;[-0.30, 0.30].forEach(x => {
    const ear = new THREE.Mesh(new THREE.SphereGeometry(0.055, 12, 10), mBear)
    ear.position.set(x, 0.37, 0.075)
    g.add(ear)
  })

  // Head ears
  ;[-1, 1].forEach(side => {
    const ear = new THREE.Mesh(new THREE.SphereGeometry(0.050, 12, 10), mBear)
    ear.position.set(side * 0.090, 0.570, 0.080)
    g.add(ear)
    const ie = new THREE.Mesh(new THREE.SphereGeometry(0.028, 10, 8), mInnerEar)
    ie.position.set(side * 0.090, 0.570, 0.112)
    g.add(ie)
  })

  // Eyes
  ;[-1, 1].forEach(side => {
    const eye = new THREE.Mesh(new THREE.SphereGeometry(0.014, 10, 8), mDark)
    eye.position.set(side * 0.038, 0.490, 0.196)
    g.add(eye)
    const shine = new THREE.Mesh(new THREE.SphereGeometry(0.006, 6, 6), new THREE.MeshBasicMaterial({ color: 0xffffff }))
    shine.position.set(side * 0.038 + 0.008, 0.496, 0.202)
    g.add(shine)
  })

  // Nose
  const nose = new THREE.Mesh(new THREE.SphereGeometry(0.019, 10, 8), mDark)
  nose.position.set(0, 0.462, 0.200)
  g.add(nose)

  // Cheeks (blush)
  ;[-1, 1].forEach(side => {
    const blush = new THREE.Mesh(
      new THREE.SphereGeometry(0.026, 10, 8),
      new THREE.MeshLambertMaterial({ color: 0xE8A090, transparent: true, opacity: 0.65 })
    )
    blush.position.set(side * 0.068, 0.458, 0.194)
    g.add(blush)
  })

  return { toyGroup: g, btnDomes }
}

// Rounded rectangle shape helper
function roundedRect(w, h, r) {
  const s = new THREE.Shape()
  s.moveTo(-w/2 + r, -h/2)
  s.lineTo( w/2 - r, -h/2)
  s.quadraticCurveTo( w/2, -h/2,  w/2, -h/2 + r)
  s.lineTo( w/2,  h/2 - r)
  s.quadraticCurveTo( w/2,  h/2,  w/2 - r,  h/2)
  s.lineTo(-w/2 + r,  h/2)
  s.quadraticCurveTo(-w/2,  h/2, -w/2,  h/2 - r)
  s.lineTo(-w/2, -h/2 + r)
  s.quadraticCurveTo(-w/2, -h/2, -w/2 + r, -h/2)
  return s
}
